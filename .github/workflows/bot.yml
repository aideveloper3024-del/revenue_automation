name: Room Availability Bot

on:
  schedule:
    - cron: '50 6 * * *'
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  run-bots:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run Makkah bot
        env:
          PYTHONUNBUFFERED: '1'
          BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          SPREADSHEET_ID: ${{ secrets.MAK_SPREADSHEET_ID }}
          WEBSITE_URL: ${{ secrets.WEBSITE_URL }}
        run: python -u mak_ram_test.py

      - name: Run Madinah bot
        env:
          PYTHONUNBUFFERED: '1'
          BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          SPREADSHEET_ID: ${{ secrets.MED_SPREADSHEET_ID }}
          WEBSITE_URL: ${{ secrets.WEBSITE_URL }}
        run: python -u med_ram_test.py